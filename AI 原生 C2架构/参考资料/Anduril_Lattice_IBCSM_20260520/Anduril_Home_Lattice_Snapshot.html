aspectRatio":1.7775,"height":1600,"width":2844},"hasAlpha":true,"isOpaque":false}}},"title":"Arsenal-1"},{"_key":"0fe9236fe0df","_type":"newsFeaturedSlice","cta":[{"_key":"958be5dead45","_type":"internalLink","reference":{"_id":"cb940787-64b7-481d-8379-537ea6a1cf56","_type":"page","language":null,"parent":null,"slug":{"_type":"slug","current":"news"},"title":"Newsroom"},"targetBlank":false,"text":"All articles","type":"primary"}],"featureArticles":[{"_key":"5e484f812a74","_type":"newsLink","link":{"_createdAt":"2025-12-09T14:44:42Z","_id":"1f825f14-b11d-4313-886d-9d1ab8d1905e","_rev":"2XVcja2XUIm0wCrDg6BH16","_type":"article","_updatedAt":"2026-03-20T20:58:41Z","authors":[{"_createdAt":"2025-04-10T02:38:50Z","_id":"c1dbab2b-5fb8-472a-bb84-9db80e122a31","_rev":"8QtQE8S3U2lXjdjxKMFvCL","_type":"person","_updatedAt":"2025-11-18T00:08:12Z","bio":[],"fullName":"Anduril Industries","image":{"_type":"image","asset":{"_ref":"image-a990fb8ef1bae814dc01807f8757917489c9e64d-2536x2536-jpg","_type":"reference"}},"metadata":null,"slug":{"_type":"slug","current":"anduril-industries"}}],"categories":[{"_createdAt":"2025-04-10T03:57:42Z","_id":"76930408-9dd1-4e94-a22a-e3fb91a252c8","_rev":"eBmLOIrMzK4fuf6o6EXXw6","_type":"articleCategory","_updatedAt":"2025-09-30T19:16:31Z","metadata":null,"slug":{"_type":"slug","current":"news"},"title":"News"}],"category":"","date":"2025-12-09","excludeFromSearch":false,"image":{"_type":"imageWithMeta","alt":"Black military drone model displayed with Union Jack flag and Anduril company branding.","asset":{"_id":"image-5b179e1cf9d40e018ba9370d3b9ac06e4963575d-9039x5895-jpg","_type":"sanity.imageAsset","mimeType":"image/jpeg","metadata":{"_type":"sanity.imageMetadata","dimensions":{"_type":"sanity.imageDimensions","aspectRatio":1.5333333333333334,"height":5895,"width":9039},"hasAlpha":false,"isOpaque":true}}},"meta":{"_type":"meta","description":"Anduril UK grows its supply chain footprint, strengthening its base of 50,000 supported jobs across the country.","excludeLLM":false,"image":{"_type":"image","asset":{"_id":"image-5b179e1cf9d40e018ba9370d3b9ac06e4963575d-9039x5895-jpg","_type":"sanity.imageAsset","mimeType":"image/jpeg","metadata":{"_type":"sanity.imageMetadata","dimensions":{"_type":"sanity.imageDimensions","aspectRatio":1.5333333333333334,"height":5895,"width":9039},"hasAlpha":false,"isOpaque":true}}},"title":"Anduril UK deepens partnerships with UK industry for British Army's Project NYX"},"metadata":null,"parent":{"_createdAt":"2025-03-18T06:18:29Z","_id":"cb940787-64b7-481d-8379-537ea6a1cf56","_rev":"CYyBncfS2CCdDhOSu8vY55","_system":{"base":{"id":"cb940787-64b7-481d-8379-537ea6a1cf56","rev":"47Qb2CrIXJQCPvP7JXfO9k"}},"_type":"page","_updatedAt":"2026-05-13T12:59:00Z","category":"company","meta":{"description":"The latest news, announcements, and insights from Anduril Industries.","title":"Newsroom | Anduril"},"metadata":null,"slices":[{"_key":"be226df55718","_type":"navColorSlice","navColorMode":"dark"},{"_key":"862b9c27dddf","_type":"newsroomHeader","header":"News & Insights","headerLabel":"NEWSROOM","highlightedArticle":{"_type":"newsLink","link":{"_ref":"c9da5725-b0db-46ab-a462-d85e3bb3a24a","_type":"reference"}}},{"_key":"54576d983b87","_type":"newsListSlice","header":"All articles"}],"slug":{"_type":"slug","current":"news"},"title":"Newsroom"},"relatedArticles":[{"_createdAt":"2025-11-10T21:25:02Z","_id":"259d992e-ebd1-4a62-8085-741fca0f2cea","_rev":"Qy55Bpk20qPJqSMUUbsfzb","_type":"article","_updatedAt":"2026-04-08T01:28:56Z","authors":[{"_key":"bc52d533f8a3","_ref":"c1dbab2b-5fb8-472a-bb84-9db80e122a31","_type":"reference"}],"categories":[{"_key":"435e85f4ba20","_ref":"76930408-9dd1-4e94-a22a-e3fb91a252c8","_type":"reference"}],"date":"2025-11-11","image":{"_type":"imageWithMeta","alt":"Person in military hangar with aircraft and vehicle equipment visible.","asset":{"_ref":"image-e60b30ccb6fc40d903774a94ff1e30755aa0f697-3840x2160-jpg","_type":"reference"}},"meta":{"_type":"meta","description":"Exploring new approaches to sovereign defense capabilities through advanced testing and development of autonomous defense systems.","title":"A New Testbed for Sovereign Defence","type":"article"},"metadata":null,"parent":{"_ref":"cb940787-64b7-481d-8379-537ea6a1cf56","_type":"reference"},"relatedArticles":[{"_key":"90f7f5ab39f8","_ref":"a6711a34-2ad7-4feb-8332-059aba709489","_type":"reference"},{"_key":"be8c277eb211","_ref":"f9ab8d42-d7e3-47f8-a5cd-16b6cce25181","_type":"reference"},{"_key":"102a6be1af41","_ref":"3b152cea-7148-424d-a1d6-102c6ff85660","_type":"reference"}],"slices":[{"_key":"00e1567659c5","_type":"oneColumnRichText","content":[{"_key":"dea5daf7ed9b","_type":"block","children":[{"_key":"d9c36115b8510","_type":"span","marks":[],"text":"Modernising and transforming the British military cannot happen overnight. Its ultimate success or failiure will be determined by the days and months that our technologists will spend close to the problems at hand, evaluating new solutions and thinking through new ways of how to quickly build up combat power. Here in Wales, we are developing that next frontier of advanced technologies for our sovereign defence — Anduril UK is building a testbed for globally competitive autonomy."}],"markDefs":[],"style":"lead"},{"_key":"5fd6add22742","_type":"block","children":[{"_key":"fe04f1f96bb7","_type":"span","marks":[],"text":"At our site, Anduril UK tests a suite of artificial intelligence-powered products for our military use, pushing reconnaissance, command-and-control, and targeting capabilities to their limits. We design them in country, to match our national need. Several of these sovereign capabilities are actively flying in the Welsh countryside while they are evaluated by our engineers. Every test is an opportunity to work out new problems "},{"_key":"d9c36115b8511","_type":"span","marks":["em"],"text":"right here"},{"_key":"d9c36115b8512","_type":"span","marks":[],"text":", so that our platforms work for the expeditionary warfighter "},{"_key":"d9c36115b8513","_type":"span","marks":["em"],"text":"out there."}],"markDefs":[],"style":"normal"},{"_key":"32914b01e106","_type":"block","children":[{"_key":"9f9a3854a316","_type":"span","marks":[],"text":"Every technnology evaluation we conduct is part of our core mission: strengthening and securing our defence. Anduril UK has already invested more than 40 percent of our internal revenue and capital into research and development to upscale military technology, including millions alone for the strategically vital autonomy sector. We feel there is a generational opportunity to strengthen our sovereign protection, create meaningful, lasting employment, and drive economic growth, but it must be harnessed through these mechanisms of investment."}],"markDefs":[],"style":"normal"},{"_key":"ac36cb208d76","_type":"block","children":[{"_key":"7a26f8f74150","_type":"span","marks":[],"text":"Anduril UK has worked within the British defence industrial base for some time. It’s now up to us to seize the potential to scale that participation far further. The nation has all the talent, skill, and ingenuity we need to achieve superior results and battle-proven defence technology. Now we must all choose to harness it."}],"markDefs":[],"style":"normal"},{"_key":"c9a100a00d3c","_type":"block","children":[{"_key":"f313528c2ac4","_type":"span","marks":[],"text":"We’re determined in our belief that building the factories of the future begins right here and right now. It is clear that British military strength must be forged and refined by a generation of technologists prepared to do their part. Anduril’s UK operation is already approaching 100 highly skilled employees, and we’re growing rapidly. Our goal is to grow this number significantly — in short order — through investing in industrial capacity and the workforce needed to build it."}],"markDefs":[],"style":"normal"},{"_key":"c8b329ca014e","_type":"block","children":[{"_key":"8ff2400d9474","_type":"span","marks":[],"text":"But we also know that this job is too large for any one company to complete alone. Anduril UK is one component of a growing ecosystem that will create thousands of quality jobs for talented individuals who are interested in advancing our nation’s protection. We intend to be active partners with many other parts of that ecosystem, multiplying and building on our shared strength."}],"markDefs":[],"style":"normal"},{"_key":"76de497a54f2","_type":"block","children":[{"_key":"64798aefa35b","_type":"span","marks":[],"text":"The war in Ukraine demonstrates the clear need for the United Kingdom to solidify and accelerate domestic mass production. As we call upon the best of British technology to build anew, we will also invest into the industrial engine and workforce that can make that technology real and enduring."}],"markDefs":[],"style":"normal"},{"_key":"ceee18b466b9","_type":"block","children":[{"_key":"d6003f369cd4","_type":"span","marks":[],"text":"This investment is only possible because of the people who make it so. The UK is a global leader in technology. Our world-class professionals are eager to work in service of consequential missions. We want the best engineers working on the hardest problems all in service of sharpening our national warfighting skills."}],"markDefs":[],"style":"normal"},{"_key":"a7f99633f1e1","_type":"block","children":[{"_key":"99a2e7e8800d","_type":"span","marks":[],"text":"The threats to our security and to our values will not wait. A new fleet of autonomous weapons that are more agile, more precise, more producible, and more effective than those in our adversaries’ arsenals are needed to maximise our defences against them. The solution is clear: it must be designed by our talent, constructed in our factories, and tested in our skies. This process starts with test engineers in Wales, but it extends to all over Britain: in key defence infrastructure, in technology labs, and through our supply chains and SMEs. It is through these means that we can preserve a generation of peace and prosperity."}],"markDefs":[],"style":"normal"},{"_key":"a2014e3676fe","_type":"block","children":[{"_key":"f68e1eeb0edf","_type":"span","marks":[],"text":"To defend British interests, Anduril UK stands ready.\n"}],"markDefs":[],"style":"normal"},{"_key":"8235f5b5889f","_type":"videoEmbed","thumbnail":{"_type":"imageWithMeta","asset":{"_ref":"image-e60b30ccb6fc40d903774a94ff1e30755aa0f697-3840x2160-jpg","_type":"reference"}},"url":"https://www.youtube.com/embed/TquN3Rbvxi8?si=Ll0y0pils1eF8m7i"}],"fullBleed":true}],"slug":{"_type":"slug","current":"a-new-testbed-for-sovereign-defence"},"title":"A New Testbed for Sovereign Defence"},{"_createdAt":"2025-05-19T13:23:38Z","_id":"a6711a34-2ad7-4feb-8332-059aba709489","_rev":"ESvEjc6swyeoEqIQr9kEw6","_type":"article","_updatedAt":"2026-04-08T01:28:34Z","authors":[{"_key":"0ec8aece1725","_ref":"c1dbab2b-5fb8-472a-bb84-9db80e122a31","_type":"reference"}],"categories":[{"_key":"435e85f4ba20","_ref":"76930408-9dd1-4e94-a22a-e3fb91a252c8","_type":"reference"}],"date":"2025-05-19","image":{"_type":"imageWithMeta","alt":"Anduril and partner logos for UK eVTOL cargo aircraft testing.","asset":{"_ref":"image-952a91dd1cb7e89aa631d4fb70876ad6bb203877-1600x1035-jpg","_type":"reference"}},"meta":{"_type":"meta","description":"Anduril Industries UK today is announcing that it will lead a team for upcoming programmes, including to bid for future flight opportunities.","title":"Anduril Industries UK and Archer, supported by Skyports Drone Services and AtkinsRéalis, Team Up to Test Dual-Use eVTOL Cargo Aircraft in UK Market","type":"article"},"metadata":null,"parent":{"_ref":"cb940787-64b7-481d-8379-537ea6a1cf56","_type":"reference"},"relatedArticles":[{"_key":"00bc1617d1b7","_ref":"3b12549e-2a89-42a9-87e0-c3658b100825","_type":"reference"},{"_key":"c2a02f87ec0a","_ref":"7e17a479-4967-4b67-8dab-da8676f17fc4","_type":"reference"},{"_key":"6d74c94c14aa","_ref":"177cc819-dad3-4f8a-a5a6-272e707a6d33","_type":"reference"}],"slices":[{"_key":"00e1567659c5","_type":"oneColumnRichText","content":[{"_key":"33b4102f3ff5","_type":"block","children":[{"_key":"653bf2eeaba50","_type":"span","marks":[],"text":"Anduril Industries UK today is announcing that it will lead a team for upcoming programmes, including to bid for future flight opportunities. Anduril UK, building on its "},{"_key":"653bf2eeaba51","_type":"span","marks":["f7b016ac9bf8"],"text":"existing partnership"},{"_key":"653bf2eeaba52","_type":"span","marks":[],"text":" with aerospace company Archer, will receive additional support from Skyports Drone Services and AtkinsRéalis, two other leading technology companies."}],"markDefs":[{"_key":"f7b016ac9bf8","_type":"link","href":"https://investors.archer.com/news/news-details/2024/Archer-Announces-Strategic-Partnership-With-Anduril-to-Develop-Hybrid-VTOL-Military-Aircraft-Raises-An-Additional-430M/default.aspx?utm_source=chatgpt.com"}],"style":"lead"},{"_key":"138dd5ddc2b9","_type":"block","children":[{"_key":"3c0e075dcbec","_type":"span","marks":[],"text":"Together, Anduril and its partners will explore civil and defence applications in the UK using Archer’s Midnight eVTOL aircraft. This includes explorations for beyond visual line of sight (BVLOS) operations, enabling low-emission, rapid-response logistics to support a wide range of UK-focused civil and military use cases, including cargo."}],"markDefs":[],"style":"normal"},{"_key":"e5c82d0779f6","_type":"block","children":[{"_key":"4c014e1ca656","_type":"span","marks":[],"text":"Anduril will serve as the lead systems integrator incorporating software-defined mission autonomy, communications, and command-and-control systems tailored for UK operational needs. Archer will act as the platform provider, adapting Archer’s Midnight platform for dual-use applications and continuing its work with Anduril on the planned hybrid aircraft."}],"markDefs":[],"style":"normal"},{"_key":"1c891739c4f6","_type":"block","children":[{"_key":"bb8143d96a50","_type":"span","marks":[],"text":"This also marks Anduril bringing in Archer’s VTOL technologies to the UK market, furthering investment, job creation and competition to strengthen the UK’s capabilities in aviation and defence, and furthering Anduril UK’s commitment to UK Defence and wider economic growth. The group will also continue work together on Archer and Anduril’s previously announced hybrid-propulsion VTOL aircraft."}],"markDefs":[],"style":"normal"},{"_key":"1a23b81d4b20","_type":"block","children":[{"_key":"57e7445b6f1a","_type":"span","marks":[],"text":"This approach to air system design and development will be supported by AtkinsRéalis’ deep expertise in safely and efficiently incorporating novel aviation technologies into UK airspace – AtkinsRéalis was recently appointed as the Civil Aviation Authority’s (CAA) first approved assessor of commercial drones."}],"markDefs":[],"style":"normal"},{"_key":"be0ccbd74038","_type":"block","children":[{"_key":"5d62fb75ed80","_type":"span","marks":[],"text":"Skyports Drone Services complements this with its own extensive operational experience, having delivered numerous beyond visual line of sight (BVLOS) campaigns for major clients including the NHS and Royal Mail. In 2024, it took part in The Royal Navy Heavy Lift Challenge, showcasing the efficacy of dual-use aircraft."}],"markDefs":[],"style":"normal"},{"_key":"605c58078e8c","_type":"block","children":[{"_key":"7727f5bd3694","_type":"span","marks":[],"text":"By combining the latest advancements in eVTOL aircraft development, software-defined systems integration, regulatory expertise and operational delivery, this team is well-positioned to support the UK’s ambition to become a global leader in aviation technologies."}],"markDefs":[],"style":"normal"},{"_key":"60f414b1fd49","_type":"block","children":[{"_key":"4587dd9a8285","_type":"span","marks":[],"text":"Dr Rich Drake, Managing Director of Anduril UK said, “The UK has clear ambitions both for innovation and growth, as well as to continue its leadership in advanced air mobility. This partnership brings together Archer’s leading eVTOL technology, Skyports’ infrastructure expertise and AtkinsRéalis’ safety systems in order to support future flight projects, accelerating VTOL and BVLOS developments. It also unlocks opportunities in defence and civil domains, including rapid, low-emission urban transport and surveillance capabilities for defence applications. Introducing Archer to the UK, alongside experienced local partners, marks a step forward in delivering integrated air mobility”."}],"markDefs":[],"style":"normal"},{"_key":"28871eb1982e","_type":"block","children":[{"_key":"c61e2fa6ce4c","_type":"span","marks":[],"text":"Verity Richardson, Head of Business Development, UK, at Archer said, “This team marks the next phase of our partnership with Anduril. There’s an incredible amount of opportunity here in the UK and worldwide to deploy dual-use advanced aircraft and we look forward to making it a reality”."}],"markDefs":[],"style":"normal"},{"_key":"696370bb5360","_type":"block","children":[{"_key":"7f657f0a9e5f","_type":"span","marks":[],"text":"Alex Brown, Director of Skyports Drone Services said, “The UK Government is making strong progress in enabling permanent BVLOS drone operations so partnering with Anduril and Archer is a natural step, as we onboard more advanced aircraft and increase our payload and range capabilities. Our first project on cargo services will lay the groundwork for other applications with significant value, such as surveillance and search and rescue”."}],"markDefs":[],"style":"normal"},{"_key":"cb912e57fc7f","_type":"block","children":[{"_key":"257183442398","_type":"span","marks":[],"text":"David Clark, Global Head of Aerospace & Defence, AtkinsRéalis, said, “Leveraging our experience in novel aircraft design and emerging regulatory frameworks, AtkinsRéalis will be supporting the team to safely integrate automated uncrewed aircrafts into the UK’s skies. The combination of local expertise with investment from industry leaders like Archer and Anduril will strengthen the UK's position at the forefront of the future of flight”."}],"markDefs":[],"style":"normal"},{"_key":"190068422fe4","_type":"block","children":[{"_key":"106a77325661","_type":"span","marks":[],"text":"Anduril UK’s software-focused approach to product development enables it to deploy new systems on compressed timelines, fielding several dual-use military capabilities, most notably providing the Ghost autonomous uncrewed air system to the UK MOD. The programme would further demonstrate Anduril UK’s commitment to engineering and manufacturing scalable technologies in the UK, building on current approaches, and bringing further investment and job creation."}],"markDefs":[],"style":"normal"},{"_key":"917e75d38f27","_type":"block","children":[{"_key":"f11140bad706","_type":"span","marks":[],"text":"Over the past two years, AtkinsRéalis and Skyports have been demonstrating the feasibility of an eVTOL ecosystem in the UK, as members of the Advanced Mobility Ecosystem Consortium, which is supported by the Future Flight Challenge Phase 3. This consortium is developing key technology and infrastructure, and exploring key aspects of the passenger journey, vehicle operation, airspace navigation, ground charging, and local stakeholder engagement."}],"markDefs":[],"style":"normal"},{"_key":"594acce39074","_type":"block","children":[{"_key":"940243aaad97","_type":"span","marks":[],"text":""}],"markDefs":[],"style":"normal"},{"_key":"e68bc35580c0","_type":"block","children":[{"_key":"5f7a4c11739f0","_type":"span","marks":["strong"],"text":"About Anduril Industries UK"}],"markDefs":[],"style":"normal"},{"_key":"a315138dc5fd","_type":"block","children":[{"_key":"33d442b5d09f0","_type":"span","marks":[],"text":"Anduril has been operating in the UK since 2019, securing contracts with UK MOD and wider UK Government. They have rapidly expanded their UK footprint from four to more than 40 in two years and intend to double again in the next twelve months, focusing on high-value technology manufacturing. Anduril UK is committed to strengthening sovereign UK defence capabilities by investing in R&D, autonomous systems, and AI-enabled Command-and-Control platforms - all essential to delivering the UK's vision of a resilient and innovative defence sector. For more information, visit"},{"_key":"33d442b5d09f1","_type":"span","marks":["599f636023e2"],"text":" www.anduril.com"},{"_key":"33d442b5d09f2","_type":"span","marks":[],"text":". "}],"markDefs":[{"_key":"599f636023e2","_type":"internalLink","reference":{"_ref":"e89bef56-785e-4374-a5ed-02677442fcd5","_type":"reference"},"targetBlank":false}],"style":"normal"},{"_key":"bdeb498c055a","_type":"block","children":[{"_key":"73c375b3500e","_type":"span","marks":[],"text":""}],"markDefs":[],"style":"normal"},{"_key":"b81e7b3f48ab","_type":"block","children":[{"_key":"140dc04369d50","_type":"span","marks":["strong"],"text":"About Archer"}],"markDefs":[{"_key":"ff1c09d62548","_type":"link","href":"https://cts.businesswire.com/ct/CT?id=smartlink&url=http%3A%2F%2Fwww.archer.com%2F&esheet=54165800&newsitemid=20241212020131&lan=en-US&anchor=www.archer.com&index=1&md5=0622eae6df6a5f8532e57b9ef0592c49"}],"style":"normal"},{"_key":"3f358d624a4e","_type":"block","children":[{"_key":"64ff2bc4e2fc","_type":"span","marks":[],"text":"Archer is designing and developing the key enabling technologies and aircraft necessary to power the future of aviation. To learn more, visit "},{"_key":"48e1c1d67a6c1","_type":"span","marks":["ff1c09d62548","strong"],"text":"www.archer.com"},{"_key":"48e1c1d67a6c2","_type":"span","marks":[],"text":"."}],"markDefs":[{"_key":"ff1c09d62548","_type":"link","href":"https://cts.businesswire.com/ct/CT?id=smartlink&url=http%3A%2F%2Fwww.archer.com%2F&esheet=54165800&newsitemid=20241212020131&lan=en-US&anchor=www.archer.com&index=1&md5=0622eae6df6a5f8532e57b9ef0592c49"}],"style":"normal"},{"_key":"f9cbc0795f4c","_type":"block","children":[{"_key":"932fffeab79d","_type":"span","marks":[],"text":""}],"markDefs":[],"style":"normal"},{"_key":"a978619f27c5","_type":"block","children":[{"_key":"efa688b377c11","_type":"span","marks":["strong"],"text":"About Skyports Drone Services"}],"markDefs":[],"style":"normal"},{"_key":"474aeb923dd1","_type":"block","children":[{"_key":"fe57053f8674","_type":"span","marks":[],"text":"Skyports Drone Services is the world’s leading drone airline. We are experts in BVLOS flight for delivery and inspection use cases. We partner with maritime and offshore industries, healthcare providers, infrastructure and asset owners, and public bodies to improve connectivity, safety and sustainability with drone operations. Skyports Drone Services is committed to scaling the drone industry to enable businesses and individuals to reap the rewards of drone technology. Skyports’ CEO Duncan Walker Co-Chairs the Future of Flight Industry Group alongside Aviation Minister Mike Kane."}],"markDefs":[],"style":"normal"},{"_key":"02e1f0f40bf5","_type":"block","children":[{"_key":"8b73a914d208","_type":"span","marks":[],"text":"Find out more at:"},{"_key":"93dc5c1ae8a81","_type":"span","marks":["cb225db208f8"],"text":" www.skyportsdroneservices.com"}],"markDefs":[{"_key":"cb225db208f8","_type":"link","href":"http://www.skyportsdroneservices.com/"}],"style":"normal"},{"_key":"8db11465be8b","_type":"block","children":[{"_key":"63d25fc80dba0","_type":"span","marks":[],"text":""}],"markDefs":[],"style":"normal"},{"_key":"2b4cf4ccca2d","_type":"block","children":[{"_key":"94cc4c3740930","_type":"span","marks":["strong"],"text":"About AtkinsRéalis"}],"markDefs":[],"style":"normal"},{"_key":"a8754a40231b","_type":"block","children":[{"_key":"e8ee796c3e46","_type":"span","marks":[],"text":"Created by the integration of long-standing organisations dating back to 1911, AtkinsRéalis is a world-class engineering services and nuclear company dedicated to engineering a better future for our planet and its people."}],"markDefs":[],"style":"normal"},{"_key":"7aabc0afbc9d","_type":"block","children":[{"_key":"daff7b36084d","_type":"span","marks":[],"text":"News and information are available at"},{"_key":"6648ba7040ba1","_type":"span","marks":["a26b77363535"],"text":" www.atkinsrealis.co"},{"_key":"6648ba7040ba2","_type":"span","marks":[],"text":"m or follow us on"},{"_key":"6648ba7040ba3","_type":"span","marks":["2901b61a9feb"],"text":" LinkedIn"},{"_key":"6648ba7040ba4","_type":"span","marks":[],"text":"."}],"markDefs":[{"_key":"a26b77363535","_type":"link","href":"http://www.atkinsrealis.com/"},{"_key":"2901b61a9feb","_type":"link","href":"http://linkedin/"}],"style":"normal"},{"_key":"ba4108b3a0d2","_type":"block","children":[{"_key":"e24ee19eb1f80","_type":"span","marks":[],"text":""}],"markDefs":[],"style":"normal"},{"_key":"1f0182c5d642","_type":"block","children":[{"_key":"7b3844e761e80","_type":"span","marks":["strong"],"text":"Archer Forward-Looking Statements"},{"_key":"7b3844e761e81","_type":"span","marks":[],"text":"This press release contains forward looking statements regarding Archer’s future business plans and expectations, including statements regarding Archer's business strategy, products, and technology, as well as plans and objectives of management for future operations. These forward-looking statements are only predictions and may differ materially from actual results due to a variety of factors. The risks and uncertainties that could cause actual results to differ from the results predicted are more fully detailed in Archer’s filings with the Securities and Exchange Commission, including its most recent Annual Report on Form 10-K available at"},{"_key":"7b3844e761e82","_type":"span","marks":["2fc70aa67d61"],"text":" www.sec.gov"},{"_key":"7b3844e761e83","_type":"span","marks":[],"text":". In addition, please note that any forward-looking statements contained herein are based on assumptions that Archer believes to be reasonable as of the date of this press release. Archer undertakes no obligation to update these statements as a result of new information or future events."}],"markDefs":[{"_key":"2fc70aa67d61","_type":"link","href":"http://www.sec.gov/"}],"style":"normal"},{"_key":"3d974caf6bbb","_type":"block","children":[{"_key":"661519ea684f","_type":"span","marks":[],"text":"Source: Archer"}],"markDefs":[],"style":"normal"},{"_key":"317221d49d06","_type":"block","children":[{"_key":"88cae4dc8202","_type":"span","marks":[],"text":"Text: ArcherIR"}],"markDefs":[],"style":"normal"},{"_key":"e7e973a280cd","_type":"block","children":[{"_key":"d4ae4117db4f0","_type":"span","marks":[],"text":"\n"}],"markDefs":[],"style":"normal"}],"fullBleed":true}],"slug":{"_type":"slug","current":"anduril-industries-uk-and-archer-supported-by-skyports-drone-services-and-atkinsrealis-team-up"},"title":"Anduril Industries UK and Archer, supported by Skyports Drone Services and AtkinsRéalis, Team Up to Test Dual-Use eVTOL Cargo Aircraft in UK Market"},{"_createdAt":"2023-11-07T21:25:12Z","_id":"f9ab8d42-d7e3-47f8-a5cd-16b6cce25181","_rev":"ESvEjc6swyeoEqIQr9k7NW","_type":"article","_updatedAt":"2026-04-08T01:28:18Z","authors":[{"_key":"44d43ae2cffb","_ref":"c1dbab2b-5fb8-472a-bb84-9db80e122a31","_type":"reference"}],"categories":[{"_key":"7932c63b26c6","_ref":"76930408-9dd1-4e94-a22a-e3fb91a252c8","_type":"reference"}],"date":"2023-11-20","image":{"_type":"imageWithMeta","alt":"Anduril appoints Richard Drake as UK and Europe General Manager.","asset":{"_ref":"image-54c6aa4e939e54deff50c31981dc601085a745af-1800x1013-png","_type":"reference"}},"meta":{"_type":"meta","description":"Anduril appoints Richard Drake as General Manager of Anduril UK & Europe","title":"Anduril appoints Richard Drake as General Manager of Anduril UK & Europe","type":"article"},"metadata":null,"parent":{"_ref":"cb940787-64b7-481d-8379-537ea6a1cf56","_type":"reference"},"relatedArticles":[{"_key":"c90f7e5b207a","_ref":"9f2b5c10-9154-4cd4-bce7-e400a702b6fd","_type":"reference"},{"_key":"bebc0de4a41a","_ref":"293b2a6e-259b-4913-b460-9de94c64cc68","_type":"reference"},{"_key":"017f49f56633","_ref":"f14b165c-cbb5-4c68-8a4e-d6787991ec74","_type":"reference"}],"slices":[{"_key":"6039ac2eb633","_type":"oneColumnRichText","content":[{"_key":"19b016c99ccf","_type":"block","children":[{"_key":"f491a72cf8fd0","_type":"span","marks":[],"text":"Defence technology company Anduril Industries today announces the appointment of Richard Drake as General Manager of Anduril UK and the broader European region."}],"markDefs":[],"style":"lead"},{"_key":"c4e74901a19f","_type":"block","children":[{"_key":"7a10c3551a18","_type":"span","marks":[],"text":"As the General Manager of Anduril UK, Drake will steer Anduril as it continues a high growth trajectory in the UK. The appointment signals Anduril’s intent to replicate its successful approach to autonomous defence capabilities in other strategic regional markets."}],"markDefs":[]},{"_key":"47fb900d135f","_type":"block","children":[{"_key":"788ef671738f","_type":"span","marks":[],"text":"Drake brings with him 16 years of experience in defence systems technology and a deep understanding of the defence procurement market. In his previous role at Babcock International as Chief Executive of Mission Systems and Group Chief Technology Officer, Drake was responsible for driving innovation and technology across the Group, managing more than 1,500 staff and reporting directly to the Group CEO. He delivered significant business growth and profitability for Babcock’s Defence Systems Technology business. Drake previously held the roles of Programme Director, Business Development Director, and Engineering Director in the same business where he led engineering activities for nearly 10 years. Prior to this, Drake was the Head of Landing Gear Extension and Retraction Systems within Airbus."}],"markDefs":[]},{"_key":"70b02624ce06","_type":"block","children":[{"_key":"90d9ceeb3a40","_type":"span","marks":[],"text":"Founded in 2017, Anduril now employs almost 2,200 people globally — more than 40 in the UK — and is valued at over £6.9 billion. Anduril continues to make a significant impact in Europe and was recently awarded a £17 million contract with the UK Ministry of Defence Strategic Command to employ counter intrusion and counter UAS capabilities at multiple locations across the UK Ministry of Defence estate, including a number of Permanent Joint Operating Bases (PJOBs)."}],"markDefs":[]},{"_key":"e0708a966811","_type":"richTextImage","image":{"_type":"imageWithMeta","asset":{"_ref":"image-2fdcf1c8dd80e38cfdc0e95528a739901ed07d86-1800x1013-jpg","_type":"reference"}},"imageWidth":"100","style":"center"},{"_key":"becc4e28e47e","_type":"block","children":[{"_key":"5b956c5c81c10","_type":"span","marks":[],"text":"Anduril Industries SVP of Global Defence said: “We’re thrilled to have Richard join our team, he is a best-in-class defence executive and an inspirational leader. His highly collaborative, technology-centered approach to business growth has been gained from over nearly two decades in the defence and security sector. We are keen for Richard to continue the great work our UK team has achieved since 2018.”"}],"markDefs":[],"style":"normal"},{"_key":"ae86db9eea35","_type":"block","children":[{"_key":"ecb4ba3d973e","_type":"span","marks":[],"text":"Richard Drake said: “I am delighted to be joining Anduril. This is a business with an exciting proposition, a desire to set ambitious industry benchmarks, and a clear, aspirational purpose; to reboot the arsenal of democracy. I very much look forward to working with the many capable and motivated people in the UK and Europe business to achieve concerted strategic growth, serve our customers with advanced technology and apply my passion for design and product development to Anduril.”"}],"markDefs":[]}],"fullBleed":true}],"slug":{"_type":"slug","current":"anduril-appoints-richard-drake-as-general-manager-of-anduril-uk-and-europe"},"title":"Anduril appoints Richard Drake as General Manager of Anduril UK & Europe"}],"slices":[{"_key":"c1acd2a16d58","_type":"oneColumnRichText","arsenalPadding":false,"content":[{"_key":"ce46594c0e89","_type":"block","children":[{"_key":"f92b6632a06b","_type":"span","marks":["em","em"],"text":"Anduril UK grows its supply chain footprint, strengthening its base of 50,000 supported jobs across the country"}],"markDefs":[],"style":"normal"},{"_key":"b6ed105c6acf","_type":"block","children":[{"_key":"07f37f8a4192","_type":"span","marks":[],"text":"Anduril UK has announced an exclusive teaming agreement with GKN Aerospace to collaborate on the British Army’s Project NYX and the Ministry of Defence’s Land Autonomous Collaborative Platform programme. The partnership will also explore future opportunities at GKN Aerospace’s Isle of Wight airframe production facility. The agreement is the latest in a series of more than 100 suppliers that Anduril has in the UK including those in support of Project NYX, marking another step in Anduril’s commitment to supporting British defence while powering technology and innovation across the UK and Europe."}],"markDefs":[],"style":"normal"},{"_key":"54e08cdab9fe","_type":"block","children":[{"_key":"07f37f8a4192","_type":"span","marks":[],"text":"Through this partnership, GKN Aerospace will become Anduril UK’s airframe manufacturing and electrical integration partner for Project NYX and other future programmes. Headquartered in the UK, GKN Aerospace has over 265 years of industrial heritage, supplying products and services to commercial and military aircraft and engine contractors. GKN Aerospace already employs nearly 1000 people at its site in Cowes. This partnership will act as a catalyst for further growth and possible job creation related to emerging, autonomous markets."}],"markDefs":[],"style":"normal"},{"_key":"d2b7bee25081","_type":"block","children":[{"_key":"07f37f8a4192","_type":"span","marks":[],"text":"The partnership with GKN Aerospace follows a series of other agreements that Anduril UK has signed with a range of partners and suppliers from across the UK industrial base to support Project NYX. These include companies such as Atom Performance Technologies, Flarebright, Olsen Actuators and Isembard, all of which play a vital role in the development and enhancement of the UK’s defence and resilience. Anduril UK’s supply chain supports an estimated 50,000 UK jobs, with significant room for growth as the company continues to build on its work in the UK and pursue additional sovereign development opportunities."}],"markDefs":[],"style":"normal"},{"_key":"e1c28b0a119e","_type":"block","children":[{"_key":"07f37f8a4192","_type":"span","marks":[],"text":"In addition to powering the existing British industrial base, Anduril’s Project NYX team will bring advanced capabilities and additional investment, job creation, and competition into the UK market. Archer Aviation will also collaborate with GKN Aerospace and Anduril UK, bringing the latest advancements in eVTOL aircraft development and hybrid propulsion to meet the British Army’s operational requirements."}],"markDefs":[],"style":"normal"},{"_key":"1b1b64d6e5e0","_type":"block","children":[{"_key":"07f37f8a4192","_type":"span","marks":[],"text":"With Anduril as the lead systems integrator, GKN Aerospace as the airframe manufacturing partner, Archer’s eVTOL expertise, and many more domestic suppliers and partners, Anduril UK’s Project NYX team pairs the best of British innovation and manufacturing expertise with leading capabilities supported by global investment in enabling technologies. The team underscores Anduril UK’s commitment to supplying the UK Armed Forces with advanced capabilities that enhance the safety and effectiveness of British service personnel on the front lines."}],"markDefs":[],"style":"normal"},{"_key":"281c51a6d6f5","_type":"block","children":[{"_key":"7bbedb887332","_type":"span","marks":["strong","strong"],"text":"Rich Drake, Managing Director of Anduril UK"},{"_key":"ea441cfd854f","_type":"span","marks":[],"text":", said:"}],"markDefs":[],"style":"normal"},{"_key":"13436f72031c","_type":"block","children":[{"_key":"ea441cfd854f","_type":"span","marks":[],"text":"“This partnership with GKN Aerospace is an exciting next step in our journey to provide and deliver innovative, sovereign solutions to the UK MOD. As we work together to create novel solutions to continuously evolving threats, we are committed to utilising the full depth and breadth of British engineering talent to provide sovereign solutions to British service personnel.”"}],"markDefs":[],"style":"normal"},{"_key":"81160f4697db","_type":"block","children":[{"_key":"fdf0da99efe6","_type":"span","marks":["strong"],"text":"Dave Bond, Senior Vice President of Defence Technology for GKN Aerospace, "},{"_key":"fee3dad35e27","_type":"span","marks":[],"text":"said:"}],"markDefs":[],"style":"normal"},{"_key":"160964c1f025","_type":"block","children":[{"_key":"fee3dad35e27","_type":"span","marks":[],"text":"“This is an extremely exciting partnership, combining cutting edge technologies and world-class industrial capabilities. Together, GKN Aerospace and Anduril will bring all-new defence solutions to the field in rapid time. This is the start of a deep and strategic partnership and I look forward to collaborating with Anduril UK for many years to come.”"}],"markDefs":[],"style":"normal"},{"_key":"ecd91f901311","_type":"block","children":[{"_key":"83d701445192","_type":"span","marks":["strong","strong"],"text":"Make UK Defence Director-General Andrew Kinniburgh said:"}],"markDefs":[],"style":"normal"},{"_key":"4c37fb337d9b","_type":"block","children":[{"_key":"490478594459","_type":"span","marks":[],"text":"“As the UK’s leading champion for the defence supply chain, we are big believers in our world leading sector – delivering innovation and economic growth across the UK."}],"markDefs":[],"style":"normal"},{"_key":"943a09a23f42","_type":"block","children":[{"_key":"490478594459","_type":"span","marks":[],"text":"“Today’s announcement of Anduril and GKN Aerospace’s partnership is a vote of confidence in our growing sector; bringing together a legendary engineering business like GKN and a technology led business like Anduril lays the foundations for more highly skilled and well paid jobs in the Isle of Wight and across the UK."}],"markDefs":[],"style":"normal"},{"_key":"6561f15c8582","_type":"block","children":[{"_key":"490478594459","_type":"span","marks":[],"text":"“It’s vital that we turn the Defence Industrial Strategy’s commitment to back UK based businesses into a reality, ensuring that defence spending is directed first to our world class defence industrial base in the UK and delivering UK economic growth.”\n\n"},{"_key":"8eabfaf06a7e","_type":"span","marks":["strong"],"text":"Richard Quigley, MP for Isle of Wight West,"},{"_key":"71623119a053","_type":"span","marks":[],"text":" said:"}],"markDefs":[],"style":"normal"},{"_key":"8ac2f657e6a4","_type":"block","children":[{"_key":"71623119a053","_type":"span","marks":[],"text":"“The partnership between GKN Aerospace and Anduril UK is exceptionally positive news for the Isle of Wight. It demonstrates that innovative, high-tech manufacturing and advanced defence capability are being developed right here, supporting local jobs and the growth of vital skills. Partnerships like this help ensure our region remains at the forefront of cutting-edge industry, and it goes hand in hand with the work I am already doing with GKN and other Island employers to create opportunities for school leavers. I warmly welcome the opportunities it will create for our community.”"}],"markDefs":[],"style":"normal"},{"_key":"e56acc340c86","_type":"block","children":[{"_key":"7a89094ce0b5","_type":"span","marks":["strong","strong"],"text":"About Anduril UK"}],"markDefs":[],"style":"normal"},{"_key":"b15ed6bdd496","_type":"block","children":[{"_key":"9c3661f31c1d","_type":"span","marks":[],"text":"Anduril has been operating in the UK since 2019, securing contracts with end—users including the Royal Marines and Strategic Command. Anduril UK have rapidly expanded their footprint and intend to continue this trajectory, focusing on high—value technology manufacturing and R&D. Anduril UK is committed to strengthening sovereign UK defence capabilities by investing in R&D, autonomous systems, and AI-enabled Command-and-Control platforms — all essential to delivering the Government’s vision of a resilient and innovative defence sector."}],"markDefs":[],"style":"normal"},{"_key":"08decf917e2f","_type":"block","children":[{"_key":"ed423e23950d","_type":"span","marks":["strong","strong"],"text":"About GKN Aerospace"}],"markDefs":[],"style":"normal"},{"_key":"359a7b59105e","_type":"block","children":[{"_key":"616e96edb483","_type":"span","marks":[],"text":"With over 265 years of industrial heritage, GKN Aerospace is a leading global supplier of airframe and engine structures, supplying products and services to commercial and military aircraft and engine contractors. Looking beyond immediate market requirements, GKN Aerospace has consistently inspired and innovated within the aerospace industry, with a manufacturing presence in 12 countries, and products improving the performance of over 100,000 flights per day. GKN Aerospace has provided solutions for platforms such as the F-35 Lightning II, the C-130, Chinook CH-47, Apache AH-64, NH90, UH-60 Black Hawk, and AgustaWestland AW101. GKN Aerospace is also a key supplier for UAV and RPAS programmes, with specific market and technology leadership in advanced aerostructures, EWIS and lightweight technologies.\n"}],"markDefs":[],"style":"normal"}],"fullBleed":false,"paragraphWidth":"w-100"}],"slug":{"_type":"slug","current":"anduril-uk-deepens-partnerships-with-uk-industry-for-british-army-s-project-nyx"},"title":"Anduril UK deepens partnerships with UK industry for British Army’s Project NYX"}}],"header":"News & Insights","highlightedArticle":{"_type":"newsLink","link":{"_createdAt":"2026-05-05T13:01:51Z","_id":"813b7f75-6b56-46aa-8521-d6a917d574cd","_rev":"m7MVAah2n5alnEqpNs8AoK","_system":{"base":{"id":"fa59920d-8f92-47ae-9338-e20ccc26d66d","rev":"5bBNxy1w70y1Phfur6VIXD"}},"_type":"article","_updatedAt":"2026-05-05T13:09:27Z","authors":[{"_createdAt":"2025-04-10T02:38:50Z","_id":"5cfc3f5e-7e5b-445f-ab74-c0321d9f7dff","_rev":"8QtQE8S3U2lXjdjxKMFvCL","_type":"person","_updatedAt":"2025-11-18T00:08:12Z","bio":[{"_key":"7634f42a95ed","_type":"block","children":[{"_key":"08409cce7ad80","_type":"span","marks":[],"text":"Previously, Gokul was Chief Engineer for Anduril’s Counter UAS capability, where he built and deployed the initial systems that led Anduril to winning a major program of record with U.S. Special Operations Command (SOCOM). Prior to joining Anduril, Gokul held leadership positions at Systems & Technology Research (STR) and Palantir Technologies. He has led programs across a variety of DoD and Intelligence organizations with a focus on software, machine learning, and autonomous systems.\n\nGokul holds a B.S. in Electrical Engineering from North Carolina State University and a M.S. in Electrical Engineering from the University of Southern California."}],"markDefs":[],"style":"normal"}],"fullName":"Gokul Subramanian","image":{"_type":"image","asset":{"_ref":"image-77928a7cd8924860cfecda8a256d0a20f8a528b1-864x864-png","_type":"reference"}},"introduction":"Gokul Subramanian is a Senior Vice President at Anduril Industries where he oversees Anduril’s Space & Intelligence Systems Division and Lattice Platform. As the General Manager for Space & Intelligence Systems, Gokul directs Anduril's efforts with the US Intelligence Community, Space Force, and partner nations. As the Software executive, Gokul oversees Anduril’s core Lattice product, which is integral to the company's family of hardware and software systems. Gokul also leads Anduril's efforts to incubate new, high potential products and programs.","metadata":null,"role":"Senior Vice President of Engineering, Software","slug":{"_type":"slug","current":"gokul-subramanian"}}],"categories":[{"_createdAt":"2025-04-10T03:57:42Z","_id":"76930408-9dd1-4e94-a22a-e3fb91a252c8","_rev":"eBmLOIrMzK4fuf6o6EXXw6","_type":"articleCategory","_updatedAt":"2025-09-30T19:16:31Z","metadata":null,"slug":{"_type":"slug","current":"news"},"title":"News"}],"category":"","date":"2026-05-05","excludeFromSearch":false,"image":{"_type":"imageWithMeta","asset":{"_id":"image-379ff9a7225299d6a26db82edfe9a0d7109be01b-4001x2251-png","_type":"sanity.imageAsset","mimeType":"image/png","metadata":{"_type":"sanity.imageMetadata","dimensions":{"_type":"sanity.imageDimensions","aspectRatio":1.7774322523322967,"height":2251,"width":4001},"hasAlpha":true,"isOpaque":true}}},"meta":{"_type":"meta","excludeLLM":false},"metadata":null,"parent":{"_createdAt":"2025-03-18T06:18:29Z","_id":"cb940787-64b7-481d-8379-537ea6a1cf56","_rev":"CYyBncfS2CCdDhOSu8vY55","_system":{"base":{"id":"cb940787-64b7-481d-8379-537ea6a1cf56","rev":"47Qb2CrIXJQCPvP7JXfO9k"}},"_type":"page","_updatedAt":"2026-05-13T12:59:00Z","category":"company","meta":{"description":"The latest news, announcements, and insights from Anduril Industries.","title":"Newsroom | Anduril"},"metadata":null,"slices":[{"_key":"be226df55718","_type":"navColorSlice","navColorMode":"dark"},{"_key":"862b9c27dddf","_type":"newsroomHeader","header":"News & Insights","headerLabel":"NEWSROOM","highlightedArticle":{"_type":"newsLink","link":{"_ref":"c9da5725-b0db-46ab-a462-d85e3bb3a24a","_type":"reference"}}},{"_key":"54576d983b87","_type":"newsListSlice","header":"All articles"}],"slug":{"_type":"slug","current":"news"},"title":"Newsroom"},"slices":[{"_key":"d0e50a0362c8","_type":"oneColumnRichText","arsenalPadding":false,"content":[{"_key":"2889d0fe8675","_type":"block","children":[{"_key":"3c2e1aa5beb0","_type":"span","marks":[],"text":"The threats facing our homeland have outpaced the shield that protects it. Near-peer adversaries have invested in exotic, highly maneuverable vehicles, introducing considerable challenges to protecting the US homeland. Ballistic missiles, hypersonic weapons, advanced cruise missiles, and other capabilities mean that these adversaries can strike faster, in greater volume, and with more advanced weapons than ever before.\n\nAs part of the Department of War’s Golden Dome for America initiative, Anduril is leading a team of industry partners that is on contract to develop, test, and deliver affordable solutions to support the U.S. Space Force’s Space-Based Interceptor (SBI) program. By bringing Anduril's proven expertise across a range of owned capabilities and combining it with proven, best-of-breed capabilities from across the commercial space industrial base, we will deliver affordable, scalable solutions to counter the rapidly-evolving missile threat. Through the SBI program, Anduril and our team of partners are defining the future of homeland defense.\n\nBringing leading solutions from across the space industrial base to critical national security missions is a central part of Anduril’s approach to the space domain. Our work on SBI continues that focus: we are integrating critical, proven systems technologies from Impulse Space, Inversion Space, K2 Space, Sandia National Labs, and Voyager Technologies into our solutions for SBI, ensuring that we will be able to deliver quickly and at scale.\n\n"},{"_key":"d75e01c84af9","_type":"span","marks":["em","em"],"text":"\"The Golden Dome program requires advanced solutions, which is where Impulse excels,\" said Eric Romo, President & COO of Impulse Space. \"Not only has our team proven its capability to do hard things quickly, but our spacecraft have too. We're excited to work on missions that are technically challenging and globally meaningful, and Golden Dome is both.\""},{"_key":"8e163d1aff6a","_type":"span","marks":[],"text":"\n\n"},{"_key":"9ee8a93fb2b3","_type":"span","marks":["em","em"],"text":"“Inversion is excited to partner with Anduril on this critical national security and technical challenge,” said Inversion Co-Founder and CEO Justin Fiaschetti. “As a team focused on advanced capabilities, we’re building systems designed for speed, scale, and real operational use. Together, our teams are accelerating the next generation of defense capabilities, bringing forces to deliver decisive impact.”"},{"_key":"0b64a0a27b1c","_type":"span","marks":[],"text":"\n\n"},{"_key":"5ad46ba13bdd","_type":"span","marks":["em","em"],"text":"“K2 Space is building satellites that are bigger and more powerful than anything on orbit, and we’re proud to be involved with Golden Dome to demonstrate what our technologies can bring to the warfighter,” said Karan Kunjur, K2 Space Co-Founder and CEO. “We're honored to partner with Anduril, who shares our vision of building at speed and scale to advance America’s national security.”"},{"_key":"6ac28110e5b6","_type":"span","marks":[],"text":"\n\n"},{"_key":"daf6ddb99247","_type":"span","marks":["em","em"],"text":"“Sandia is excited to partner with Anduril to develop advanced technologies for the warfighter,” said Scott McEntire, Senior Manager for Hypersonics at Sandia National Labs. “We proudly bring our decades of experience in advanced weapons development to bear as we partner to create new systems!”"},{"_key":"116327cb988d","_type":"span","marks":[],"text":"\n\n"},{"_key":"a75b7d5caf5c","_type":"span","marks":["em","em"],"text":"\"The Space Force’s Space-based Interceptor program is the answer to threats that leave zero reaction time. You have to be already there, already ready, and it’s why getting it right – fast – is a national imperative,” said Matt Magaña, president, Space, Defense & National Security at Voyager Technologies. “That’s why we’re excited to partner with Anduril, a company who understands speed and national security. We’re bringing the full force of our company, including the Voyager American Defense Complex, to execute with the scale, infrastructure and technical depth the mission demands.”"},{"_key":"b1f1625a8552","_type":"span","marks":[],"text":"\n\nAnduril’s SBI team brings proven capabilities, leading technical expertise, and a commitment to moving quickly to solve one of the most critical, most complex problem sets facing the American homeland today. From commercial space startups to established research institutions, the Department of War’s SBI program has established a clear demand signal that has energized the entire space industrial base. Together, we are committed to building affordable, scalable, and reliable space-based interceptors on a timeline relevant to the threat.\n\nEffective layered missile defense requires both hardware and software working together to detect, track, and defeat incoming threats. Anduril’s work supporting the SBI program and broader Golden Dome for America initiative is a direct reflection of our mission: to rapidly deliver advanced, mission-ready systems for the most critical challenges shaping the future of American defense. We are already moving at pace to deliver."}],"markDefs":[],"style":"normal"}],"fullBleed":false,"paragraphWidth":"w-100"}],"slug":{"_type":"slug","current":"anduril-team-of-partners-to-work-on-space-force-s-space-based-interceptors-for-golden-dome-for-america"},"title":"Anduril, Team of Partners to Work on Space Force’s Space-Based Interceptors for Golden Dome for America","viewType":"main"}},"showThumbnail":false},{"_key":"7421e4647b68","_type":"mediaLinkSlice","cards":[{"_key":"57a5d3c0a644","_type":"mediaLinkCard","color":{"_createdAt":"2025-03-28T19:57:45Z","_id":"312278d0-9291-4102-932f-2fbe38d107f5","_rev":"x8r7rwnZNJLuzU8uziaQjt","_system":{"base":{"id":"312278d0-9291-4102-932f-2fbe38d107f5","rev":"3h6Aq9HwJKloB0447GtDIQ"}},"_type":"color","_updatedAt":"2025-0
