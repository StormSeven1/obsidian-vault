<rect x="1415" y="300" width="560" height="340" fill="#fafaf8" stroke="#0a0a0a" stroke-width="3" />
<text x="1460" y="365" fill="#0a0a0a" font-size="52" font-weight="200" >控制执行链路</text>
<text x="1460" y="425" fill="#0a0a0a" font-size="27" font-weight="300" >受理经确认的控制请求，执行波形、波束、门限、跟踪参数等真实下发。</text>
