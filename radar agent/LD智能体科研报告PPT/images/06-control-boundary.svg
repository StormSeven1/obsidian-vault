<text x="90" y="86" fill="#737373" font-size="22" font-weight="500" class="mono">CONTROL BOUNDARY / SAFETY GATE</text>
<text x="90" y="158" fill="#0a0a0a" font-size="70" font-weight="200" >控制边界与安全门控</text>
<line x1="90" y1="188" x2="2010" y2="188" stroke="#d4d4d2" stroke-width="2" />

<rect x="135" y="300" width="560" height="340" fill="#fafaf8" stroke="#0a0a0a" stroke-width="3" />
<text x="180" y="365" fill="#0a0a0a" font-size="52" font-weight="200" >认知核心</text>
<text x="180" y="425" fill="#0a0a0a" font-size="27" font-weight="300" >生成研判结论、候选参数方案、证据缺口、风险说明和工作流触发请求。</text>
