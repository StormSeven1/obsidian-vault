<svg xmlns="http://www.w3.org/2000/svg" width="2200" height="1300" viewBox="0 0 2200 1300">
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#173A5E"/></marker>
<style>text{font-family:"Microsoft YaHei","Noto Sans SC",Arial,sans-serif;dominant-baseline:middle}</style>
</defs>
<rect x="0" y="0" width="2200" height="1300" rx="0" fill="#F7FAFC" stroke="#F7FAFC" stroke-width="0"/>
<rect x="0" y="0" width="2200" height="112" rx="0" fill="#173A5E" stroke="#173A5E" stroke-width="0"/>
<text text-anchor="start" font-size="34" font-weight="700" fill="#FFFFFF"><tspan x="54" y="52.0">图 4.3.3.2-2 五大核心模块功能组成图</tspan></text>
<text text-anchor="end" font-size="20" font-weight="400" fill="#D9E7F5"><tspan x="2140" y="53.0">功能定位 / 流程作用 / 贯穿治理</tspan></text>
<line x1="54" y1="1190" x2="2146" y2="1190" stroke="#C8D3DF" stroke-width="2" stroke-linecap="round"/>
<rect x="90" y="180" width="2020" height="78" rx="20" fill="#173A5E" stroke="#173A5E" stroke-width="0"/>
<text text-anchor="middle" font-size="28" font-weight="700" fill="#FFFFFF"><tspan x="1100.0" y="218.0">统一任务实例贯穿：任务理解 → 智能研判 → 参数建议 → 流程执行 → 经验沉淀</tspan></text>
<rect x="90" y="345" width="360" height="430" rx="20" fill="#DDEBFA" stroke="#2563A6" stroke-width="3"/>
<rect x="90" y="345" width="360" height="62" rx="20" fill="#2563A6" stroke="#2563A6" stroke-width="0"/>
<text text-anchor="start" font-size="24" font-weight="700" fill="#FFFFFF"><tspan x="112" y="373.0">认知核心模块</tspan></text>
<text text-anchor="start" font-size="22" font-weight="400" fill="#142033"><tspan x="114" y="428.6">智能推理、任务规划与运行协调</tspan><tspan x="114" y="459.9">中心</tspan><tspan x="114" y="491.1"></tspan><tspan x="114" y="522.3">主要承担意图理解、任务建模、</tspan><tspan x="114" y="553.6">上下文组织、执行路径规划、研</tspan><tspan x="114" y="584.8">判结论与候选方案生成。</tspan></text>
<rect x="505" y="345" width="360" height="430" rx="20" fill="#EEE8FF" stroke="#6950A1" stroke-width="3"/>
<rect x="505" y="345" width="360" height="62" rx="20" fill="#6950A1" stroke="#6950A1" stroke-width="0"/>
<text text-anchor="start" font-size="24" font-weight="700" fill="#FFFFFF"><tspan x="527" y="373.0">记忆管理模块</tspan></text>
<text text-anchor="start" font-size="22" font-weight="400" fill="#142033"><tspan x="529" y="428.6">面向智能体任务的上下文与经验</tspan><tspan x="529" y="459.9">管理中心</tspan><tspan x="529" y="491.1"></tspan><tspan x="529" y="522.3">管理短期任务记忆、中期任务链</tspan><tspan x="529" y="553.6">、长期经验资产，支撑检索增强</tspan><tspan x="529" y="584.8">与经验回流。</tspan></text>
<rect x="920" y="345" width="360" height="430" rx="20" fill="#D9F2EE" stroke="#0F766E" stroke-width="3"/>
<rect x="920" y="345" width="360" height="62" rx="20" fill="#0F766E" stroke="#0F766E" stroke-width="0"/>
<text text-anchor="start" font-size="24" font-weight="700" fill="#FFFFFF"><tspan x="942" y="373.0">工具执行模块</tspan></text>
<text text-anchor="start" font-size="22" font-weight="400" fill="#142033"><tspan x="944" y="428.6">雷达专业能力的统一执行代理</tspan><tspan x="944" y="459.9"></tspan><tspan x="944" y="491.1">封装感知解释、数据查询、目标</tspan><tspan x="944" y="522.3">分析、参数仿真、控制适配和报</tspan><tspan x="944" y="553.6">告生成工具。</tspan></text>
<rect x="1335" y="345" width="360" height="430" rx="20" fill="#FFF0CC" stroke="#B06A00" stroke-width="3"/>
<rect x="1335" y="345" width="360" height="62" rx="20" fill="#B06A00" stroke="#B06A00" stroke-width="0"/>
<text text-anchor="start" font-size="24" font-weight="700" fill="#FFFFFF"><tspan x="1357" y="373.0">工作流引擎模块</tspan></text>
<text text-anchor="start" font-size="22" font-weight="400" fill="#142033"><tspan x="1359" y="428.6">标准流程与高风险动作的受控执</tspan><tspan x="1359" y="459.9">行引擎</tspan><tspan x="1359" y="491.1"></tspan><tspan x="1359" y="522.3">管理模板、节点、审批、检查点</tspan><tspan x="1359" y="553.6">、回滚和流程追溯。</tspan></text>
<rect x="1750" y="345" width="360" height="430" rx="20" fill="#E3F3DC" stroke="#477A36" stroke-width="3"/>
<rect x="1750" y="345" width="360" height="62" rx="20" fill="#477A36" stroke="#477A36" stroke-width="0"/>
<text text-anchor="start" font-size="24" font-weight="700" fill="#FFFFFF"><tspan x="1772" y="373.0">数据库管理与接入模块</tspan></text>
<text text-anchor="start" font-size="22" font-weight="400" fill="#142033"><tspan x="1774" y="428.6">智能体侧数据访问、记忆支撑和</tspan><tspan x="1774" y="459.9">追溯写入适配中心</tspan><tspan x="1774" y="491.1"></tspan><tspan x="1774" y="522.3">提供关系、向量、图关系和时序</tspan><tspan x="1774" y="553.6">数据统一访问。</tspan></text>
<line x1="450" y1="560" x2="505" y2="560" stroke="#C8D3DF" stroke-width="4" stroke-linecap="round"/>
<line x1="865" y1="560" x2="920" y2="560" stroke="#C8D3DF" stroke-width="4" stroke-linecap="round"/>
<line x1="1280" y1="560" x2="1335" y2="560" stroke="#C8D3DF" stroke-width="4" stroke-linecap="round"/>
<line x1="1695" y1="560" x2="1750" y2="560" stroke="#C8D3DF" stroke-width="4" stroke-linecap="round"/>
<rect x="245" y="880" width="1710" height="120" rx="22" fill="#EDF2F7" stroke="#C8D3DF" stroke-width="3"/>
<text text-anchor="middle" font-size="28" font-weight="700" fill="#173A5E"><tspan x="1100.0" y="916.0">贯穿式治理机制</tspan></text>
<text text-anchor="middle" font-size="24" font-weight="400" fill="#142033"><tspan x="1100.0" y="961.0">运行底座、安全门控、追溯记录和运行观测贯穿五大模块，不改变核心功能模块划分。</tspan></text>
<text text-anchor="middle" font-size="22" font-weight="400" fill="#607085"><tspan x="1100.0" y="1231.0">图中模块强调功能和流程协同，避免把运行治理机制写成彼此割裂的职责边界。</tspan></text>
</svg>