<text text-anchor="middle" font-size="22" font-weight="400" fill="#607085"><tspan x="1100.0" y="1231.0">低风险任务可由门控放行动态工具调用；高风险或控制请求必须进入工作流模板并绑定追溯引用。</tspan></text>
