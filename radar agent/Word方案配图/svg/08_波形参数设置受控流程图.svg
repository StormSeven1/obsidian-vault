<line x1="1380" y1="750" x2="1265" y2="750" stroke="#173A5E" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
<line x1="745" y1="750" x2="630" y2="750" stroke="#173A5E" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
<line x1="370" y1="665" x2="370" y2="435" stroke="#477A36" stroke-width="4" stroke-linecap="round" stroke-dasharray="12 10" marker-end="url(#arrow)"/>
<rect x="790" y="1040" width="620" height="74" rx="20" fill="#EDF2F7" stroke="#C8D3DF" stroke-width="3"/>
<text text-anchor="middle" font-size="24" font-weight="700" fill="#142033"><tspan x="1100.0" y="1058.0">效果指标、异常信息和操作员反馈进入追溯记录与记忆回</tspan><tspan x="1100.0" y="1092.0">流</tspan></text>
<text text-anchor="middle" font-size="22" font-weight="400" fill="#607085"><tspan x="1100.0" y="1231.0">该流程用于说明控制链路安全边界：智能体生成候选方案，工作流完成校验审批，控制执行链路完成真实下发。</tspan></text>
</svg>