<text text-anchor="start" font-size="34" font-weight="700" fill="#FFFFFF"><tspan x="54" y="52.0">图 4.3.3.2-8 波形参数设置受控流程图</tspan></text>
<text text-anchor="end" font-size="20" font-weight="400" fill="#D9E7F5"><tspan x="2140" y="53.0">候选方案 / 校验仿真 / 人工确认 / 状态回传</tspan></text>
<line x1="54" y1="1190" x2="2146" y2="1190" stroke="#C8D3DF" stroke-width="2" stroke-linecap="round"/>
<rect x="110" y="265" width="520" height="170" rx="22" fill="#DDEBFA" stroke="#2563A6" stroke-width="3"/>
<rect x="136" y="293" width="50" height="50" rx="25" fill="#2563A6" stroke="#2563A6" stroke-width="0"/>
<text text-anchor="middle" font-size="22" font-weight="700" fill="#FFFFFF"><tspan x="161.0" y="318.0">1</tspan></text>
<text text-anchor="start" font-size="29" font-weight="700" fill="#2563A6"><tspan x="205" y="308.0">候选方案生成</tspan></text>
<text text-anchor="start" font-size="22" font-weight="400" fill="#142033"><tspan x="205" y="358.6">认知核心结合任务目标、目标状态、雷达</tspan><tspan x="205" y="389.9">资源和历史效果形成候选参数。</tspan></text>
<rect x="745" y="265" width="520" height="170" rx="22" fill="#EEE8FF" stroke="#6950A1" stroke-width="3"/>
<rect x="771" y="293" width="50" height="50" rx="25" fill="#6950A1" stroke="#6950A1" stroke-width="0"/>
<text text-anchor="middle" font-size="22" font-weight="700" fill="#FFFFFF"><tspan x="796.0" y="318.0">2</tspan></text>
<text text-anchor="start" font-size="29" font-weight="700" fill="#6950A1"><tspan x="840" y="308.0">参数边界校验</tspan></text>
<text text-anchor="start" font-size="22" font-weight="400" fill="#142033"><tspan x="840" y="358.6">检查频段、功率、波束资源、检测门限和</tspan><tspan x="840" y="389.9">跟踪参数边界。</tspan></text>
<rect x="1380" y="265" width="520" height="170" rx="22" fill="#FFF0CC" stroke="#B06A00" stroke-width="3"/>
<rect x="1406" y="293" width="50" height="50" rx="25" fill="#B06A00" stroke="#B06A00" stroke-width="0"/>
<text text-anchor="middle" font-size="22" font-weight="700" fill="#FFFFFF"><tspan x="1431.0" y="318.0">3</tspan></text>
<text text-anchor="start" font-size="29" font-weight="700" fill="#B06A00"><tspan x="1475" y="308.0">仿真评估</tspan></text>
<text text-anchor="start" font-size="22" font-weight="400" fill="#142033"><tspan x="1475" y="358.6">评估预期效果、风险点、适用条件和回滚</tspan><tspan x="1475" y="389.9">条件。</tspan></text>
<rect x="1380" y="665" width="520" height="170" rx="22" fill="#FDE2E2" stroke="#B43A3A" stroke-width="3"/>
<rect x="1406" y="693" width="50" height="50" rx="25" fill="#B43A3A" stroke="#B43A3A" stroke-width="0"/>
<text text-anchor="middle" font-size="22" font-weight="700" fill="#FFFFFF"><tspan x="1431.0" y="718.0">4</tspan></text>
<text text-anchor="start" font-size="29" font-weight="700" fill="#B43A3A"><tspan x="1475" y="708.0">人工确认</tspan></text>
<text text-anchor="start" font-size="22" font-weight="400" fill="#142033"><tspan x="1475" y="758.6">显控分系统展示风险提示、待确认事项和</tspan><tspan x="1475" y="789.9">审批回调。</tspan></text>
<rect x="745" y="665" width="520" height="170" rx="22" fill="#D9F2EE" stroke="#0F766E" stroke-width="3"/>
<rect x="771" y="693" width="50" height="50" rx="25" fill="#0F766E" stroke="#0F766E" stroke-width="0"/>
<text text-anchor="middle" font-size="22" font-weight="700" fill="#FFFFFF"><tspan x="796.0" y="718.0">5</tspan></text>
<text text-anchor="start" font-size="29" font-weight="700" fill="#0F766E"><tspan x="840" y="708.0">控制请求适配</tspan></text>
<text text-anchor="start" font-size="22" font-weight="400" fill="#142033"><tspan x="840" y="758.6">按控制链路接口组织经审批的控制请求和</tspan><tspan x="840" y="789.9">检查点信息。</tspan></text>
<rect x="110" y="665" width="520" height="170" rx="22" fill="#E3F3DC" stroke="#477A36" stroke-width="3"/>
<rect x="136" y="693" width="50" height="50" rx="25" fill="#477A36" stroke="#477A36" stroke-width="0"/>
<text text-anchor="middle" font-size="22" font-weight="700" fill="#FFFFFF"><tspan x="161.0" y="718.0">6</tspan></text>
<text text-anchor="start" font-size="29" font-weight="700" fill="#477A36"><tspan x="205" y="708.0">状态跟踪与回滚</tspan></text>
<text text-anchor="start" font-size="22" font-weight="400" fill="#142033"><tspan x="205" y="758.6">跟踪受理、执行、异常、效果指标和回滚</tspan><tspan x="205" y="789.9">结果。</tspan></text>
