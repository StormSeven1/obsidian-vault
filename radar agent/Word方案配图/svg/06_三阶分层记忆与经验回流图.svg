<text text-anchor="start" font-size="19" font-weight="400" fill="#142033"><tspan x="544" y="311.5">上下文版本、证据编号、工具结果、</tspan><tspan x="544" y="338.5">流程状态，用于当前任务不断裂。</tspan></text>
<rect x="960" y="450" width="360" height="190" rx="20" fill="#EEE8FF" stroke="#6950A1" stroke-width="3"/>
<rect x="960" y="450" width="360" height="54" rx="20" fill="#6950A1" stroke="#6950A1" stroke-width="0"/>
<text text-anchor="start" font-size="21" font-weight="700" fill="#FFFFFF"><tspan x="982" y="478.0">追溯记录</tspan></text>
<text text-anchor="start" font-size="19" font-weight="400" fill="#142033"><tspan x="984" y="521.5">输入、推理、工具调用、工作流节点</tspan><tspan x="984" y="548.5">、审批动作、输出结果和反馈。</tspan></text>
<rect x="1400" y="240" width="360" height="190" rx="20" fill="#FFF0CC" stroke="#B06A00" stroke-width="3"/>
<rect x="1400" y="240" width="360" height="54" rx="20" fill="#B06A00" stroke="#B06A00" stroke-width="0"/>
<text text-anchor="start" font-size="21" font-weight="700" fill="#FFFFFF"><tspan x="1422" y="268.0">中期任务链</tspan></text>
<text text-anchor="start" font-size="19" font-weight="400" fill="#142033"><tspan x="1424" y="311.5">目标链、区域链、参数链、异常链，</tspan><tspan x="1424" y="338.5">用于近期连续任务关联。</tspan></text>
<rect x="1770" y="450" width="330" height="190" rx="20" fill="#E3F3DC" stroke="#477A36" stroke-width="3"/>
<rect x="1770" y="450" width="330" height="54" rx="20" fill="#477A36" stroke="#477A36" stroke-width="0"/>
<text text-anchor="start" font-size="21" font-weight="700" fill="#FFFFFF"><tspan x="1792" y="478.0">长期经验资产</tspan></text>
<text text-anchor="start" font-size="19" font-weight="400" fill="#142033"><tspan x="1794" y="521.5">知识库、案例库、策略库、经验</tspan><tspan x="1794" y="548.5">库，带版本、来源和适用边界。</tspan></text>
