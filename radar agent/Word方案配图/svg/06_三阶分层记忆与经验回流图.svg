<line x1="1935" y1="1010" x2="265" y2="1010" stroke="#477A36" stroke-width="4" stroke-linecap="round" stroke-dasharray="12 10" marker-end="url(#arrow)"/>
<line x1="265" y1="1010" x2="265" y2="640" stroke="#477A36" stroke-width="4" stroke-linecap="round" stroke-dasharray="12 10" marker-end="url(#arrow)"/>
<text text-anchor="middle" font-size="25" font-weight="700" fill="#477A36"><tspan x="1095.0" y="1050.0">受控回流：相似案例、策略推荐、工具匹配、流程优化</tspan></text>
<text text-anchor="middle" font-size="22" font-weight="400" fill="#607085"><tspan x="1100.0" y="1231.0">经验回流不是简单归档：任务记录先成为经验候选，再经质量评估和复核后进入长期资产。</tspan></text>
</svg>