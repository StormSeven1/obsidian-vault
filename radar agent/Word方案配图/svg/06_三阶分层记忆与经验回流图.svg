<text text-anchor="middle" font-size="23" font-weight="400" fill="#142033"><tspan x="1105.0" y="850.7">冲突检查 / 适用条件 / 版本管理 / 影子运行 </tspan><tspan x="1105.0" y="883.3">/ 人工复核</tspan></text>
<line x1="1140" y1="640" x2="1140" y2="780" stroke="#B43A3A" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
