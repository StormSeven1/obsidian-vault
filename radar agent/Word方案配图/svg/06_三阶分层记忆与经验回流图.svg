<text text-anchor="start" font-size="34" font-weight="700" fill="#FFFFFF"><tspan x="54" y="52.0">图 4.3.3.2-6 三阶分层记忆与经验回流图</tspan></text>
<text text-anchor="end" font-size="20" font-weight="400" fill="#D9E7F5"><tspan x="2140" y="53.0">短期上下文 / 中期任务链 / 长期经验资产</tspan></text>
