<text text-anchor="start" font-size="21" font-weight="700" fill="#FFFFFF"><tspan x="122" y="478.0">当前任务上下文</tspan></text>
<text text-anchor="start" font-size="19" font-weight="400" fill="#142033"><tspan x="124" y="521.5">任务目标、感知证据、雷达状态</tspan><tspan x="124" y="548.5">、工具结果、候选方案、检查点</tspan></text>
