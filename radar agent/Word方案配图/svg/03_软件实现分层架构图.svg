<rect x="480" y="630" width="1520" height="130" rx="22" fill="#D9F2EE" stroke="#0F766E" stroke-width="3"/>
<text text-anchor="middle" font-size="30" font-weight="400" fill="#142033"><tspan x="1240.0" y="672.7">大语言模型推理引擎、雷达专业能力包、工具执行适配、数据库访问适</tspan><tspan x="1240.0" y="715.3">配、语义检索、图关系与时序查询</tspan></text>
<line x1="1090" y1="760" x2="1090" y2="835" stroke="#0F766E" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
<rect x="145" y="840" width="280" height="130" rx="22" fill="#477A36" stroke="#477A36" stroke-width="0"/>
<text text-anchor="middle" font-size="34" font-weight="700" fill="#FFFFFF"><tspan x="285.0" y="905.0">资源层</tspan></text>
<rect x="480" y="840" width="1520" height="130" rx="22" fill="#E3F3DC" stroke="#477A36" stroke-width="3"/>
<text text-anchor="middle" font-size="30" font-weight="400" fill="#142033"><tspan x="1240.0" y="882.7">模型算力、关系库/向量库/图数据库/时序库、感知结果、雷达状态</tspan><tspan x="1240.0" y="925.3">、控制执行接口、雷达知识与历史案例</tspan></text>
<rect x="530" y="1075" width="1140" height="72" rx="18" fill="#EDF2F7" stroke="#C8D3DF" stroke-width="3"/>
<text text-anchor="middle" font-size="25" font-weight="700" fill="#142033"><tspan x="1100.0" y="1106.0">五大核心模块用于说明功能组成；四层架构用于说明软件实现组织方式。</tspan></text>
<text text-anchor="middle" font-size="22" font-weight="400" fill="#607085"><tspan x="1100.0" y="1231.0">映射关系：认知核心承接应用层与服务层，记忆/工具/工作流位于服务层和组件层，数据库接入连接组件层与资源层。</tspan></text>
