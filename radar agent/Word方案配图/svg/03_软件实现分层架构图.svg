<text text-anchor="start" font-size="34" font-weight="700" fill="#FFFFFF"><tspan x="54" y="52.0">图 4.3.3.2-3 软件实现分层架构图</tspan></text>
<text text-anchor="end" font-size="20" font-weight="400" fill="#D9E7F5"><tspan x="2140" y="53.0">应用层 / 服务层 / 组件层 / 资源层</tspan></text>
<line x1="54" y1="1190" x2="2146" y2="1190" stroke="#C8D3DF" stroke-width="2" stroke-linecap="round"/>
<rect x="145" y="210" width="280" height="130" rx="22" fill="#2563A6" stroke="#2563A6" stroke-width="0"/>
<text text-anchor="middle" font-size="34" font-weight="700" fill="#FFFFFF"><tspan x="285.0" y="275.0">应用层</tspan></text>
<rect x="480" y="210" width="1520" height="130" rx="22" fill="#DDEBFA" stroke="#2563A6" stroke-width="3"/>
<text text-anchor="middle" font-size="30" font-weight="400" fill="#142033"><tspan x="1240.0" y="274.0">态势问答、目标研判、波形参数建议、流程状态展示、复盘报告生成</tspan></text>
<line x1="1090" y1="340" x2="1090" y2="415" stroke="#2563A6" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
<rect x="145" y="420" width="280" height="130" rx="22" fill="#6950A1" stroke="#6950A1" stroke-width="0"/>
<text text-anchor="middle" font-size="34" font-weight="700" fill="#FFFFFF"><tspan x="285.0" y="485.0">服务层</tspan></text>
<rect x="480" y="420" width="1520" height="130" rx="22" fill="#EEE8FF" stroke="#6950A1" stroke-width="3"/>
<text text-anchor="middle" font-size="30" font-weight="400" fill="#142033"><tspan x="1240.0" y="462.7">任务运行管理、认知推理、工作流编排、记忆管理、安全门控机制、追</tspan><tspan x="1240.0" y="505.3">溯记录</tspan></text>
<line x1="1090" y1="550" x2="1090" y2="625" stroke="#6950A1" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
<rect x="145" y="630" width="280" height="130" rx="22" fill="#0F766E" stroke="#0F766E" stroke-width="0"/>
